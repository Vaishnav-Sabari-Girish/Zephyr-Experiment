# printk() enable for console output
CONFIG_PRINTK=y

# Enable Logging 
# CONFIG_LOG=y

# Enable GPIOS
# CONFIG_GPIO=y

# Enable the Bluetooth subsystem
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="nRF52840_Server"
CONFIG_BT_GATT_DYNAMIC_DB=y

# Increase BLE MTU to allow larger text payloads
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251
