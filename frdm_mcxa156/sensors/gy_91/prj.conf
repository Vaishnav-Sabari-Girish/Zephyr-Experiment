# printk() enable for console output
# CONFIG_PRINTK=y

# Enable Logging 
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Enable GPIOS
# CONFIG_GPIO=y

# Enable I2C 
CONFIG_I2C=y

# Sensor Subsystem 
CONFIG_SENSOR=y

# MPU9250 driver 
CONFIG_MPU9250=y
CONFIG_MPU9250_TRIGGER_NONE=y
CONFIG_MPU9250_MAGN_EN=y

# BME280 driver
CONFIG_BME280=y

# Floating point printing support
CONFIG_CBPRINTF_FP_SUPPORT=y
