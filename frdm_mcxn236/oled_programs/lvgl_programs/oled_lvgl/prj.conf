# System and Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Memory Allocations (Expanded to prevent boot-time Stack Overflows)
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=32768

# Hardware Display Driver
CONFIG_I2C=y
CONFIG_DISPLAY=y
CONFIG_SSD1306=y

# Disable standard text graphics, enable LVGL
CONFIG_CHARACTER_FRAMEBUFFER=n
CONFIG_LVGL=y

# ---------------------------------------------------------
# THE MONOCHROME ALIGNMENT FIX 
# ---------------------------------------------------------
CONFIG_LV_COLOR_DEPTH_1=y
CONFIG_LV_Z_BITS_PER_PIXEL=1
CONFIG_LV_Z_MEM_POOL_SIZE=16384

# Force LVGL to update the whole screen at once, never partially.
# This prevents the 8-pixel unaligned memory corruption (grainy screen).
CONFIG_LV_Z_VDB_SIZE=100
CONFIG_LV_Z_FULL_REFRESH=y

# ---------------------------------------------------------
# THE MONOCHROME FONT FIX
# ---------------------------------------------------------
# Disable the default smooth font
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_14=n

# Enable the 1-bit blocky pixel font
CONFIG_LV_FONT_UNSCII_8=y
CONFIG_LV_FONT_DEFAULT_UNSCII_8=y
