# printk() enable for console output
# CONFIG_PRINTK=y

# Enable Logging 
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Enable GPIOS
# CONFIG_GPIO=y

# Stack size
CONFIG_MAIN_STACK_SIZE=4096

# I2C and Display stuff 
CONFIG_I2C=y
CONFIG_DISPLAY=y
CONFIG_SSD1306=y
CONFIG_CHARACTER_FRAMEBUFFER=y
CONFIG_HEAP_MEM_POOL_SIZE=16384

# Sensor and IMU stuff
CONFIG_SENSOR=y
CONFIG_FXLS8974=y
CONFIG_CBPRINTF_FP_SUPPORT=y
