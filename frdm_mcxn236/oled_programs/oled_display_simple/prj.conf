# printk() enable for console output
# CONFIG_PRINTK=y

# Enable Logging 
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Enable GPIOS
# CONFIG_GPIO=y

# Enable Heap Memory for the Character framebuffer
CONFIG_HEAP_MEM_POOL_SIZE=16384

# Enable I2C 
CONFIG_I2C=y

# Enable Display Subsystem
CONFIG_DISPLAY=y

# Specific Display driver (Contains drivers even for SH1106)
CONFIG_SSD1306=y

# Character framebuffer for easy text rendering 
CONFIG_CHARACTER_FRAMEBUFFER=y
